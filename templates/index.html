<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Генератор поздравлений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            display: none;
        }
        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        .result h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .result-text {
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .error {
            background: #ffe6e6;
            border-left-color: #ff4444;
        }
        .error h3 {
            color: #ff4444;
        }
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 18px;
            display: none;
        }
        .loading.show {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Генератор поздравлений</h1>
        <p class="subtitle">Создай уникальное поздравление с помощью AI</p>
        
        <form id="congratsForm">
            <div class="form-group">
                <label for="name">Имя именинника:</label>
                <input type="text" id="name" name="name" required placeholder="Например: Александр">
            </div>
            
            <div class="form-group">
                <label for="age">Возраст:</label>
                <input type="number" id="age" name="age" required placeholder="Например: 25">
            </div>
            
            <div class="form-group">
                <label for="hobby">Увлечения:</label>
                <input type="text" id="hobby" name="hobby" required placeholder="Например: программирование, спорт">
            </div>
            
            <div class="form-group">
                <label for="style">Стиль поздравления:</label>
                <select id="style" name="style" required>
                    <option value="Весёлое">😂 Весёлое</option>
                    <option value="Трогательное">🥹 Трогательное</option>
                    <option value="Дерзкое">🔥 Дерзкое</option>
                    <option value="Официальное">🎩 Официальное</option>
                </select>
            </div>
            
            <button type="submit" id="generateBtn">✨ Сгенерировать поздравление</button>
        </form>
        
        <div class="loading" id="loading">
            ⏳ Генерирую... Подождите 10-15 секунд
        </div>
        
        <div class="result" id="result">
            <h3>✨ Готово!</h3>
            <div class="result-text" id="resultText"></div>
        </div>
    </div>

    <script>
        document.getElementById('congratsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const resultText = document.getElementById('resultText');
            
            btn.disabled = true;
            loading.classList.add('show');
            result.classList.remove('show');
            
            const data = {
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                hobby: document.getElementById('hobby').value,
                style: document.getElementById('style').value
            };
            
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultText.textContent = result.text;
                    document.getElementById('result').classList.add('show');
                } else {
                    resultText.textContent = 'Ошибка: ' + result.error;
                    document.getElementById('result').classList.add('show', 'error');
                }
            } catch (error) {
                resultText.textContent = 'Ошибка подключения: ' + error.message;
                document.getElementById('result').classList.add('show', 'error');
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        });
    </script>
</body>
</html>
